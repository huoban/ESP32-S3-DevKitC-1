<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>传感器配置 - ESP32-S3 打印服务器</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>📡 传感器配置</h1>
                <p class="subtitle">管理各类外接传感器（功能开发中）</p>
            </div>
            <a href="/" class="btn btn-secondary">← 返回首页</a>
        </header>

        <!-- 传感器列表 -->
        <div class="card">
            <h2>🔌 传感器列表</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">状态:</span>
                    <span class="value">功能开发中...</span>
                </div>
            </div>
            <div style="margin-top: 20px; padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: center;">
                <p style="font-size: 48px; margin-bottom: 10px;">🚧</p>
                <p style="color: #666;">传感器模块正在开发中，敬请期待！</p>
            </div>
        </div>

        <!-- 页脚 -->
        <footer>
            <p>ESP32-S3 打印服务器 v1.0</p>
            <p>基于 ESP-IDF v5.5.3 + TinyUSB Host</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
