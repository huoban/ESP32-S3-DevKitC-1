<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 打印服务器</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>ESP32-S3 打印服务器</h1>
            <p class="subtitle">家庭打印中心</p>
        </header>

        <!-- 系统信息 -->
        <div class="card">
            <h2>系统信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <span class="label">设备名称:</span>
                    <span class="value" id="device_name">--</span>
                </div>
                <div class="info-item">
                    <span class="label">IP 地址:</span>
                    <span class="value" id="ip_address">--</span>
                </div>
                <div class="info-item">
                    <span class="label">PSRAM 剩余/总容量:</span>
                    <span class="value" id="psram_info">--</span>
                </div>
                <div class="info-item">
                    <span class="label">系统温度:</span>
                    <span class="value" id="temperature">--</span> ℃
                </div>
                <div class="info-item">
                    <span class="label">WiFi 状态:</span>
                    <span class="value" id="wifi_status">--</span>
                </div>
                <div class="info-item">
                    <span class="label">运行时间:</span>
                    <span class="value" id="uptime">--</span>
                </div>
                <div class="info-item">
                    <span class="label">连接打印机:</span>
                    <span class="value" id="printer_count">0</span>
                </div>
                <div class="info-item">
                    <span class="label">开发板系统时间:</span>
                    <span class="value" id="system_time">--</span>
                </div>
                <div class="info-item">
                    <span class="label">NTP 最后校准:</span>
                    <span class="value" id="ntp_last_sync">--</span>
                </div>
            </div>
        </div>

        <!-- 导航 -->
        <div class="nav">
            <a href="/wifi.html" class="nav-item">
                <div class="nav-icon">📶</div>
                <div class="nav-text">WiFi 配置</div>
            </a>
            <a href="/usb.html" class="nav-item">
                <div class="nav-icon">🖨️</div>
                <div class="nav-text">USB 打印机</div>
            </a>
            <a href="/monitor.html" class="nav-item">
                <div class="nav-icon">📊</div>
                <div class="nav-text">网站监控</div>
            </a>
            <a href="/webhook.html" class="nav-item">
                <div class="nav-icon">🔔</div>
                <div class="nav-text">通知配置</div>
            </a>
            <a href="/sensors.html" class="nav-item">
                <div class="nav-icon">📡</div>
                <div class="nav-text">传感器</div>
            </a>
        </div>

        <!-- 快捷操作 -->
        <div class="card">
            <h2>快捷操作</h2>
            <div class="actions">
                <button onclick="if(confirm('确定要重启系统吗？')){fetch('/api/system/reboot',{method:'POST'}).then(function(r){return r.json()}).then(function(d){if(d.success){alert('系统正在重启...');setTimeout(function(){location.reload();},5000)}else{alert('重启失败: '+d.message)}}).catch(function(e){alert('请求失败: '+e.message)})}" class="btn btn-danger">重启系统</button>
                <button onclick="if(confirm('确定要恢复出厂设置吗？这将清除所有配置！')){if(confirm('再次确认：恢复出厂设置后系统将重启！')){fetch('/api/system/reset',{method:'POST'}).then(function(r){return r.json()}).then(function(d){if(d.success){alert('系统正在恢复出厂设置并重启...');setTimeout(function(){location.reload();},5000)}else{alert('恢复出厂设置失败: '+d.message)}}).catch(function(e){alert('请求失败: '+e.message)})}}" class="btn btn-warning">恢复出厂设置</button>
                <button onclick="document.getElementById('otaModal').style.display='block'" class="btn btn-primary">OTA 固件上传</button>
                <button onclick="window.open('https://github.com/huoban/ESP32-S3-DevKitC-1','_blank')" class="btn btn-secondary">Help</button>
            </div>
        </div>

        <!-- OTA 上传模态框 -->
        <div id="otaModal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2>OTA 固件更新</h2>
                <form id="otaForm" onsubmit="uploadFirmware(event)">
                    <div class="form-group">
                        <label for="firmware_url">固件 URL (HTTPS):</label>
                        <input type="url" id="firmware_url" name="firmware_url" placeholder="https://example.com/firmware.bin" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">开始更新</button>
                        <button type="button" onclick="closeOtaModal()" class="btn btn-secondary">取消</button>
                    </div>
                </form>
                <div id="otaProgress" style="margin-top: 20px; display: none;">
                    <div class="progress-bar">
                        <div id="progress" class="progress"></div>
                    </div>
                    <p id="otaStatus" style="margin-top: 10px;"></p>
                </div>
            </div>
        </div>

        <!-- 页脚 -->
        <footer>
            <p>ESP32-S3 打印服务器 v1.0</p>
            <p>基于 ESP-IDF v5.5.3 + TinyUSB Host</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
